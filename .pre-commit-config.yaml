default_stages: [pre-commit]
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix, "--config", "pyproject.toml"]
      - id: ruff-format
        args: ["--config", "pyproject.toml"]
